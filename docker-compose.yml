version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: atelier-commerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atelier_commerce
      POSTGRES_USER: atelier
      POSTGRES_PASSWORD: atelier
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atelier -d atelier_commerce"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
